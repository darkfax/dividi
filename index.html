<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dividi & Conquista! 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --bg1:#FFF0F5;--bg2:#FDE8F0;--bg3:#F8D8E8;
  --ground:#E8F5E9;--ground2:#C8E6C9;
  --accent:#E91E8C;--accent2:#D81B8E;
  --gold:#FFB347;--gold2:#FFA726;
  --pink:#F48FB1;--pink2:#EC407A;
  --lilac:#CE93D8;--lilac2:#BA68C8;
  --mint:#80CBC4;--mint2:#4DB6AC;
  --green:#66BB6A;--red:#EF5350;
  --peach:#FFCCBC;
  --card:rgba(255,255,255,0.75);
  --card-solid:rgba(255,255,255,0.92);
  --text:#4A2040;--text-light:#7B5070;--text-dim:rgba(74,32,64,0.5);
  --radius:24px;--radius-sm:16px;
  --shadow:0 4px 24px rgba(200,100,150,0.12);
  --shadow-lg:0 8px 32px rgba(200,100,150,0.18);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Nunito Sans',sans-serif;
  background:linear-gradient(170deg,var(--bg1) 0%,var(--bg2) 35%,var(--bg3) 65%,var(--ground) 88%,var(--ground2) 100%);
  color:var(--text);display:flex;justify-content:center;
}
.app{width:100%;max-width:520px;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.stars{position:fixed;top:0;left:0;width:100%;height:85%;pointer-events:none;z-index:0}
.star{position:absolute;animation:floatUp var(--d) ease-in-out infinite alternate;opacity:0.35;font-size:var(--sz,14px)}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-12px) rotate(15deg)}}
.particle{position:fixed;pointer-events:none;z-index:999;border-radius:50%;animation:particleUp 0.8s ease-out forwards}
@keyframes particleUp{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;z-index:10;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.avatar-circle{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--lilac));display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 3px 12px rgba(236,64,122,0.25);border:3px solid white;transition:transform 0.3s}
.avatar-circle.levelup{animation:avatarPop 0.6s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes avatarPop{0%{transform:scale(1)}50%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1)}}
.player-info{display:flex;flex-direction:column;gap:2px}
.player-level{font-family:'Baloo 2',cursive;font-size:0.8rem;font-weight:700;color:var(--accent)}
.player-name-display{font-size:0.7rem;color:var(--text-dim);font-weight:600}
.xp-bar-wrap{width:80px;height:6px;background:rgba(206,147,216,0.25);border-radius:10px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--lilac));border-radius:10px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.topbar-right{display:flex;gap:8px;align-items:center}
.stat-pill{display:flex;align-items:center;gap:4px;background:var(--card);backdrop-filter:blur(10px);padding:5px 10px;border-radius:20px;font-weight:800;font-size:0.8rem;box-shadow:0 2px 8px rgba(200,100,150,0.1);color:var(--text)}
.back-menu-btn{-webkit-appearance:none;appearance:none;background:var(--card);border:2px solid rgba(236,64,122,0.15);border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);box-shadow:var(--shadow)}

/* SCREENS */
.screen{flex:1;display:flex;flex-direction:column;z-index:10;padding:20px}
.screen.centered{align-items:center;justify-content:center;text-align:center;gap:16px}
.hidden{display:none!important}

/* PROFILE SELECT */
.profile-title{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--pink2),var(--lilac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.profile-sub{color:var(--text-dim);font-size:0.9rem}
.profiles-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;max-height:45vh;overflow-y:auto}
.profile-row{-webkit-appearance:none;appearance:none;font:inherit;background:var(--card);border:2px solid rgba(236,64,122,0.1);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);color:var(--text);width:100%;text-align:left}
.profile-row:active{transform:scale(0.97)}
.profile-row .p-avatar{font-size:1.8rem}
.profile-row .p-info{flex:1}
.profile-row .p-name{font-family:'Baloo 2',cursive;font-weight:700;font-size:1rem}
.profile-row .p-stats{font-size:0.7rem;color:var(--text-dim)}
.profile-row .p-delete{font-size:0.9rem;padding:4px 8px;opacity:0.4}
.new-profile-btn{-webkit-appearance:none;appearance:none;font:inherit;background:linear-gradient(135deg,var(--pink),var(--lilac));border:none;border-radius:var(--radius-sm);padding:14px 28px;font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:700;color:white;cursor:pointer;box-shadow:0 3px 12px rgba(236,64,122,0.2);margin-top:8px}

/* NEW PROFILE CREATION */
.avatar-picker{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:300px}
.avatar-option{-webkit-appearance:none;appearance:none;font:inherit;background:var(--card);border:3px solid transparent;border-radius:50%;width:52px;height:52px;font-size:1.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.avatar-option.selected{border-color:var(--accent);background:rgba(236,64,122,0.1);transform:scale(1.15)}
.name-input{-webkit-appearance:none;appearance:none;font:inherit;background:var(--card);border:2px solid rgba(236,64,122,0.15);border-radius:var(--radius-sm);padding:14px 18px;font-size:1.1rem;font-weight:700;text-align:center;color:var(--text);width:100%;max-width:260px;outline:none}
.name-input:focus{border-color:var(--pink)}
.create-btn{-webkit-appearance:none;appearance:none;font:inherit;background:linear-gradient(135deg,var(--pink),var(--lilac));border:none;border-radius:var(--radius-sm);padding:14px 36px;font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;color:white;cursor:pointer;box-shadow:0 3px 12px rgba(236,64,122,0.2)}
.create-btn:disabled{opacity:0.4;cursor:default}
.small-link{-webkit-appearance:none;appearance:none;font:inherit;background:none;border:none;color:var(--text-dim);font-size:0.85rem;cursor:pointer;text-decoration:underline}

/* MODE SELECT */
.mode-title{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;text-align:center;line-height:1.2;background:linear-gradient(135deg,var(--pink2),var(--lilac2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mode-subtitle{color:var(--text-dim);text-align:center;font-size:0.9rem}
.modes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:380px}
button.mode-card,.mode-card{-webkit-appearance:none;appearance:none;font:inherit;background:var(--card);backdrop-filter:blur(12px);border:2px solid rgba(236,64,122,0.12);border-radius:var(--radius);padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all 0.25s;text-align:center;position:relative;overflow:hidden;box-shadow:var(--shadow);color:var(--text)}
.mode-card:active{transform:scale(0.95)}
.mode-emoji{font-size:2.2rem}
.mode-name{font-family:'Baloo 2',cursive;font-weight:700;font-size:0.95rem}
.mode-desc{font-size:0.7rem;color:var(--text-dim);line-height:1.3}
.bottom-links{display:flex;gap:16px;margin-top:12px}

/* LEADERBOARD */
.lb-title{font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;color:var(--accent)}
.lb-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px;max-height:50vh;overflow-y:auto}
.lb-row{background:var(--card);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.lb-rank{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.1rem;width:28px;text-align:center}
.lb-rank.gold{color:#FFB347}.lb-rank.silver{color:#B0BEC5}.lb-rank.bronze{color:#FFAB91}
.lb-avatar{font-size:1.5rem}
.lb-info{flex:1}
.lb-name{font-family:'Baloo 2',cursive;font-weight:700;font-size:0.9rem}
.lb-score{font-size:0.7rem;color:var(--text-dim)}

/* TROPHIES */
.trophies-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:340px;max-height:50vh;overflow-y:auto}
.trophy-card{background:var(--card);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;box-shadow:var(--shadow);transition:all 0.2s}
.trophy-card.locked{opacity:0.3;filter:grayscale(1)}
.trophy-emoji{font-size:2rem}
.trophy-name{font-family:'Baloo 2',cursive;font-size:0.7rem;font-weight:700;margin-top:4px;color:var(--text)}
.trophy-desc{font-size:0.6rem;color:var(--text-dim);margin-top:2px}

/* GAME AREA */
.game-area{flex:1;display:flex;flex-direction:column;padding:0 16px 16px;z-index:10;animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.game-mode-label{font-family:'Baloo 2',cursive;font-size:0.95rem;font-weight:700;display:flex;align-items:center;gap:6px;color:var(--text)}
.game-timer{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;color:var(--accent);min-width:50px;text-align:right}
.game-timer.danger{color:var(--red);animation:pulse 0.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.progress-track{height:8px;background:rgba(206,147,216,0.2);border-radius:10px;margin-bottom:12px;overflow:hidden}
.progress-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--pink),var(--lilac),var(--gold));transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.q-card{background:var(--card-solid);border:2px solid rgba(236,64,122,0.08);border-radius:var(--radius);padding:20px 18px;box-shadow:var(--shadow-lg);flex:1;display:flex;flex-direction:column;animation:cardFlip 0.35s ease-out;position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch}
@keyframes cardFlip{0%{opacity:0;transform:perspective(600px) rotateY(-8deg) scale(0.96)}100%{opacity:1;transform:perspective(600px) rotateY(0) scale(1)}}
.q-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;align-self:flex-start;margin-bottom:10px}
.badge-calc{background:rgba(186,104,200,0.15);color:var(--lilac2)}
.badge-brain{background:rgba(102,187,106,0.15);color:var(--green)}
.badge-trap{background:rgba(236,64,122,0.12);color:var(--pink2)}
.badge-boss{background:rgba(255,179,71,0.18);color:#E65100}
.q-text{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:600;line-height:1.4;margin-bottom:16px;flex-shrink:0;color:var(--text)}
.q-text .num{font-size:2rem;font-weight:800;color:var(--accent)}
.q-text .op{font-size:1.6rem;color:var(--lilac2);margin:0 5px}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:auto}
.ans-btn{-webkit-appearance:none;appearance:none;font:inherit;background:rgba(248,216,232,0.4);border:2px solid rgba(236,64,122,0.15);border-radius:var(--radius-sm);padding:14px 8px;font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.3;-webkit-user-select:none;user-select:none}
.ans-btn.textual{font-family:'Nunito Sans',sans-serif;font-size:0.85rem;font-weight:700}
.ans-btn:active{transform:scale(0.93)}
.ans-btn.correct{background:rgba(102,187,106,0.2);border-color:var(--green);animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.ans-btn.wrong{background:rgba(239,83,80,0.15);border-color:var(--red);animation:shake 0.4s}
@keyframes popIn{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.fb-area{margin-top:10px;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fb-msg{padding:10px 14px;border-radius:var(--radius-sm);font-weight:700;font-size:0.9rem;text-align:center}
.fb-msg.ok{background:rgba(102,187,106,0.15);color:#2E7D32}
.fb-msg.ko{background:rgba(239,83,80,0.12);color:#C62828}
.fb-explain{margin-top:6px;padding:8px 12px;background:rgba(186,104,200,0.1);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--lilac2);line-height:1.5}
.xp-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Baloo 2',cursive;font-size:2.2rem;font-weight:800;color:var(--gold);text-shadow:0 0 20px rgba(255,179,71,0.5);z-index:1000;pointer-events:none;animation:xpFloat 1s ease-out forwards}
@keyframes xpFloat{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-60%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-120%) scale(0.8)}}
.streak-toast{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;z-index:1000;pointer-events:none;animation:streakPop 1.2s ease-out forwards;text-shadow:0 0 16px rgba(236,64,122,0.4)}
@keyframes streakPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(-10deg)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(5deg)}40%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(-50%,-80%) scale(0.7)}}
.next-btn{-webkit-appearance:none;appearance:none;font:inherit;margin-top:8px;background:linear-gradient(135deg,var(--pink),var(--lilac));border:none;border-radius:var(--radius-sm);padding:12px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;color:white;cursor:pointer;width:100%;box-shadow:0 3px 12px rgba(236,64,122,0.2)}
.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto}
.tf-btn{-webkit-appearance:none;appearance:none;font:inherit;padding:18px;border-radius:var(--radius);font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;cursor:pointer;border:3px solid transparent;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.tf-true{background:rgba(102,187,106,0.12);color:var(--green);border-color:rgba(102,187,106,0.25)}
.tf-false{background:rgba(239,83,80,0.1);color:var(--red);border-color:rgba(239,83,80,0.2)}
.tf-btn.correct{animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.tf-btn.wrong{animation:shake 0.4s}
.boss-hp-bar{height:12px;background:rgba(206,147,216,0.2);border-radius:10px;margin-bottom:12px;overflow:hidden;position:relative}
.boss-hp-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--pink));transition:width 0.5s}
.boss-hp-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:800;color:var(--text)}
.boss-emoji{font-size:2.8rem;text-align:center;margin-bottom:6px;animation:bossIdle 2s infinite}
@keyframes bossIdle{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(3deg)}}
.boss-emoji.hit{animation:bossHit 0.4s}
@keyframes bossHit{0%{transform:scale(1)}30%{transform:scale(0.8) rotate(-15deg)}70%{transform:scale(1.1) rotate(5deg)}100%{transform:scale(1)}}
.boss-emoji.defeated{animation:bossDefeat 1s forwards}
@keyframes bossDefeat{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3) rotate(20deg)}100%{transform:scale(0) rotate(180deg);opacity:0}}

/* END */
.end-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;text-align:center;padding:20px;gap:10px}
.end-trophy{font-size:4rem;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.end-title{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:var(--text)}
.end-score{font-family:'Baloo 2',cursive;font-size:3rem;font-weight:800;color:var(--accent)}
.end-stars{font-size:2rem;letter-spacing:6px}
.end-detail{font-size:0.85rem;color:var(--text-dim);max-width:280px;line-height:1.5}
.end-xp{font-family:'Baloo 2',cursive;font-size:1.1rem;color:var(--lilac2)}
.end-trophies{font-size:0.85rem;color:var(--gold2);font-weight:700}
.play-again-btn{-webkit-appearance:none;appearance:none;font:inherit;background:linear-gradient(135deg,var(--pink),var(--lilac));border:none;border-radius:20px;padding:14px 36px;font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;color:white;cursor:pointer;box-shadow:0 4px 20px rgba(236,64,122,0.25)}
.combo-display{position:absolute;top:6px;right:10px;font-family:'Baloo 2',cursive;font-weight:800;font-size:0.8rem;color:var(--pink2);opacity:0.9}
@media(min-width:768px){.q-text{font-size:1.55rem}.q-text .num{font-size:2.3rem}.ans-btn{font-size:1.3rem;padding:16px}.mode-title{font-size:2.4rem}}
</style>
</head>
<body>
<div class="app" id="app">
<div class="stars" id="stars"></div>

<!-- TOPBAR -->
<div class="topbar hidden" id="topbar">
  <div class="topbar-left">
    <div class="avatar-circle" id="avatar">🌷</div>
    <div class="player-info">
      <div class="player-name-display" id="playerNameDisp"></div>
      <div class="player-level" id="levelLabel">Lv.1</div>
      <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="stat-pill">⭐ <span id="totalScore">0</span></div>
    <div class="stat-pill">🔥 <span id="streakDisp">0</span></div>
    <button class="back-menu-btn" id="backMenuBtn">🏠</button>
  </div>
</div>

<!-- SCREEN: PROFILE SELECT -->
<div class="screen centered" id="profileScreen">
  <div style="font-size:3.5rem">🌸</div>
  <div class="profile-title">Dividi & Conquista!</div>
  <div class="profile-sub">Chi gioca?</div>
  <div class="profiles-list" id="profilesList"></div>
  <button class="new-profile-btn" id="newProfileBtn">+ Nuovo giocatore</button>
  <button class="small-link" id="resetAllBtn" style="margin-top:12px;color:var(--red)">🗑️ Cancella tutti i dati</button>
</div>

<!-- SCREEN: CREATE PROFILE -->
<div class="screen centered hidden" id="createScreen">
  <div class="profile-title">Crea il tuo profilo!</div>
  <div class="profile-sub">Scegli il tuo avatar</div>
  <div class="avatar-picker" id="avatarPicker"></div>
  <div class="profile-sub" style="margin-top:8px">Come ti chiami?</div>
  <input class="name-input" id="nameInput" type="text" placeholder="Il tuo nome..." maxlength="12" autocomplete="off">
  <button class="create-btn" id="createBtn" disabled>Iniziamo! 🚀</button>
  <button class="small-link" id="backToProfiles">← Torna indietro</button>
</div>

<!-- SCREEN: MODE SELECT -->
<div class="screen centered hidden" id="modeScreen">
  <div class="mode-title">Ciao <span id="welcomeName"></span>! 🌸</div>
  <div class="mode-subtitle">Scegli la tua avventura</div>
  <div class="modes-grid">
    <button class="mode-card" id="modeClassica"><div class="mode-emoji">📚</div><div class="mode-name">Classica</div><div class="mode-desc">15 domande con calma</div></button>
    <button class="mode-card" id="modeBlitz"><div class="mode-emoji">⚡</div><div class="mode-name">Blitz</div><div class="mode-desc">Quante in 60 secondi?</div></button>
    <button class="mode-card" id="modeVeroFalso"><div class="mode-emoji">🎯</div><div class="mode-name">Vero o Falso</div><div class="mode-desc">Risposte lampo!</div></button>
    <button class="mode-card" id="modeBoss"><div class="mode-emoji">🧚</div><div class="mode-name">Sfida Magica</div><div class="mode-desc">Sconfiggi la strega!</div></button>
  </div>

// === AUDIO ===

function sfxCorrect(){playTone(784,0.12,'triangle',0.1);setTimeout(function(){playTone(988,0.12,'triangle',0.1)},100);setTimeout(function(){playTone(1175,0.18,'triangle',0.08)},200)}

// === DECORATIONS ===
try{(function(){var c=document.getElementById('stars');if(!c)return;var shapes=['✿','❀','♡','☆','✧','🌸','🦋','·','◦'];for(var i=0;i<40;i++){var s=document.createElement('div');s.className='star';s.textContent=shapes[Math.floor(Math.random()*shapes.length)];s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--sz:'+(10+Math.random()*16)+'px;animation-delay:'+Math.random()*3+'s';c.appendChild(s)}})()}catch(e){}

function confettiBurst(count){var colors=['#F48FB1','#CE93D8','#FFB347','#80CBC4','#F8BBD0','#B39DDB','#FFCC80','#A5D6A7'];for(var i=0;i<(count||40);i++){var p=document.createElement('div');p.className='particle';p.style.cssText='left:'+Math.random()*window.innerWidth+'px;top:-10px;width:'+(5+Math.random()*8)+'px;height:'+(5+Math.random()*8)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';--dx:'+(Math.random()-0.5)*200+'px;--dy:'+(window.innerHeight*0.6+Math.random()*200)+'px;border-radius:'+(Math.random()>0.5?'50%':'2px')+';animation-duration:'+(1+Math.random()*1.5)+'s;animation-delay:'+Math.random()*0.4+'s';document.body.appendChild(p);setTimeout(function(el){return function(){el.remove()}}(p),2500)}}

// === STORAGE ===
function storeGet(k){try{if(typeof localStorage==='undefined')return null;var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function storeSet(k,v){try{if(typeof localStorage!=='undefined')localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

var AVATAR_LIST=['🌷','🌸','🦋','🌺','🦄','🌈','👸','🐱','🐰','🌻','🍓','🎀','💖','🐬','🦊','🐝'];
var currentProfile=null;

function getProfiles(){return storeGet('dc_profiles')||[]}
function saveProfiles(p){storeSet('dc_profiles',p)}

function showScreen(id){var screens=['profileScreen','createScreen','modeScreen','lbScreen','trophyScreen','gameArea','endScreen'];for(var i=0;i<screens.length;i++)document.getElementById(screens[i]).classList.add('hidden');document.getElementById(id).classList.remove('hidden');var tb=document.getElementById('topbar');if(id==='gameArea'||id==='endScreen')tb.classList.remove('hidden');else tb.classList.add('hidden')}

function renderProfiles(){
  var list=document.getElementById('profilesList');list.innerHTML='';
  var profiles=getProfiles();
  for(var i=0;i<profiles.length;i++){(function(p,idx){
    var row=document.createElement('button');row.className='profile-row';
    row.innerHTML='<span class="p-avatar">'+p.avatar+'</span><div class="p-info"><div class="p-name">'+p.name+'</div><div class="p-stats">Lv.'+p.level+' · ⭐ '+p.totalCorrect+'</div></div><span class="p-delete">✕</span>';
    var deleteMode=false;
    row.addEventListener('click',function(e){
      if(e.target.classList.contains('p-delete')){
        if(!deleteMode){
          deleteMode=true;
          e.target.textContent='Elimina?';
          e.target.style.cssText='font-size:0.7rem;padding:6px 10px;background:var(--red);color:white;border-radius:10px;opacity:1';
          setTimeout(function(){if(deleteMode){deleteMode=false;e.target.textContent='✕';e.target.style.cssText='font-size:0.9rem;padding:4px 8px;opacity:0.4'}},3000);
        }else{
          var ps=getProfiles();ps.splice(idx,1);saveProfiles(ps);renderProfiles();
        }
        return;
      }
      selectProfile(idx);
    });
    list.appendChild(row);
  })(profiles[i],i)}

}

  var profiles=getProfiles();
  currentProfile=profiles[idx];
  currentProfile._idx=idx;
  document.getElementById('welcomeName').textContent=currentProfile.name;

}

// === CREATE PROFILE ===
var selectedAvatar='';
function renderAvatarPicker(){
  var picker=document.getElementById('avatarPicker');picker.innerHTML='';
  for(var i=0;i<AVATAR_LIST.length;i++){(function(av){
    var btn=document.createElement('button');btn.className='avatar-option';btn.textContent=av;
    btn.addEventListener('click',function(){
      var all=picker.querySelectorAll('.avatar-option');for(var j=0;j<all.length;j++)all[j].classList.remove('selected');
      btn.classList.add('selected');selectedAvatar=av;checkCreateReady();
    });
    picker.appendChild(btn);
  })(AVATAR_LIST[i])}
}
function checkCreateReady(){
  var name=document.getElementById('nameInput').value.trim();

}
function createProfile(){
  var name=document.getElementById('nameInput').value.trim();

  var profiles=getProfiles();
  profiles.push({name:name,avatar:selectedAvatar,xp:0,level:1,totalCorrect:0,bestStreak:0,gamesPlayed:0,trophies:[]});
  saveProfiles(profiles);
  document.getElementById('nameInput').value='';selectedAvatar='';

var ALL_TROPHIES=[

function awardTrophy(id){
  if(!currentProfile)return false;
  if(currentProfile.trophies.indexOf(id)>=0)return false;
  currentProfile.trophies.push(id);
  saveCurrentProfile();return true;
}
function checkTrophies(){
  var p=currentProfile,newOnes=[];

  if(p.bestStreak>=7&&awardTrophy('streak_7'))newOnes.push('🔥🔥 Super combo!');
  if(p.bestStreak>=10&&awardTrophy('streak_10'))newOnes.push('💥 Inarrestabile!');
  if(p.gamesPlayed>=5&&awardTrophy('games_5'))newOnes.push('📚 Studentessa!');

// === GAME STATE ===
var G={mode:'',score:0,streak:0,bestStreak:0,current:0,questions:[],answered:false,total:15,timer:0,timerInterval:null,bossHp:0,bossMaxHp:0,blitzCount:0};
var LEVEL_NAMES=['Fiorellino','Farfallina','Stellina','Esploratrice','Fatina','Principessa','Regina','Leggenda'];
var XP_PER_LEVEL=100;

function xpForLevel(l){return l*XP_PER_LEVEL}

  if(!currentProfile)return;currentProfile.xp+=amount;var leveled=false;
  while(currentProfile.xp>=xpForLevel(currentProfile.level)){currentProfile.xp-=xpForLevel(currentProfile.level);currentProfile.level++;leveled=true}

}

  document.getElementById('totalScore').textContent=G.score;
  document.getElementById('streakDisp').textContent=G.streak;
}

// === QUESTION GENERATORS ===
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function wrongAnswers(c,n,min,max){var w={};var arr=[-2,-1,1,2,-3,3];for(var i=0;i<arr.length;i++){var v=c+arr[i];if(v>0&&v!==c&&v>=min&&v<=max)w[v]=true}var t=0;while(Object.keys(w).length<n&&t<50){var v2=ri(min,max);if(v2!==c)w[v2]=true;t++}return shuffle(Object.keys(w).map(Number)).slice(0,n)}

function qGruppi(){var g=ri(2,8),p=ri(2,10),tot=g*p;var items=[{o:'caramelle',t:['Hai <span class="num">%t</span> caramelle da dividere in <span class="num">%g</span> sacchetti uguali. Quante per sacchetto?','Distribuisci <span class="num">%t</span> caramelle tra <span class="num">%g</span> bambini. Quante a testa?']},{o:'figurine',t:['Hai <span class="num">%t</span> figurine da dividere tra <span class="num">%g</span> amici. Quante a testa?']},{o:'matite',t:['Hai <span class="num">%t</span> matite da mettere in <span class="num">%g</span> astucci uguali. Quante per astuccio?']},{o:'biscotti',t:['Hai sfornato <span class="num">%t</span> biscotti e li metti in <span class="num">%g</span> piatti uguali. Quanti per piatto?']},{o:'biglie',t:['Hai <span class="num">%t</span> biglie da dividere in <span class="num">%g</span> sacchetti. Quante per sacchetto?']},{o:'libri',t:['La biblioteca ha <span class="num">%t</span> libri da mettere in <span class="num">%g</span> scaffali uguali. Quanti per scaffale?']},{o:'fiori',t:['Il fioraio ha <span class="num">%t</span> fiori da mettere in <span class="num">%g</span> vasi uguali. Quanti per vaso?']},{o:'perline',t:['Hai <span class="num">%t</span> perline per fare <span class="num">%g</span> braccialetti uguali. Quante per braccialetto?']},{o:'cioccolatini',t:['Ci sono <span class="num">%t</span> cioccolatini da dividere tra <span class="num">%g</span> persone. Quanti a testa?']},{o:'monete',t:['Dividi <span class="num">%t</span> monete in <span class="num">%g</span> pile uguali. Quante per pila?']},{o:'palloncini',t:['Per la festa ci sono <span class="num">%t</span> palloncini da dividere in <span class="num">%g</span> mazzi uguali. Quanti per mazzo?']},{o:'stelle',t:['La maestra ha <span class="num">%t</span> stelle da dare a <span class="num">%g</span> bambini in parti uguali. Quante a testa?']}];var it=items[ri(0,items.length-1)];var txt=it.t[ri(0,it.t.length-1)].replace(/%t/g,tot).replace(/%g/g,g);var opts=shuffle([p].concat(wrongAnswers(p,3,1,12)));return{type:'brain',badge:'🧠 Ragionamento',cls:'badge-brain',html:txt,options:opts.map(String),correct:String(p),explain:tot+' ÷ '+g+' = '+p+' '+it.o+' per gruppo'}}

function qInversa(){var d=ri(2,10),q=ri(2,10),dd=d*q;var v=ri(0,1);var html,correct,explain;if(v===0){correct=dd;html='Quale numero diviso <span class="num">'+d+'</span> dà <span class="num">'+q+'</span>?';explain='? = '+d+' × '+q+' = '+dd}else{correct=d;html='Per quale numero devi dividere <span class="num">'+dd+'</span> per ottenere <span class="num">'+q+'</span>?';explain='? = '+dd+' ÷ '+q+' = '+d}var opts=shuffle([correct].concat(wrongAnswers(correct,3,2,Math.max(correct+5,15))));return{type:'calc',badge:'🔢 Calcolo',cls:'badge-calc',html:html,options:opts.map(String),correct:String(correct),explain:explain}}

function buildClassica(){var qs=[];for(var i=0;i<2;i++)qs.push(qNumericDiv());qs.push(qQuanteVolte());qs.push(qGruppi());qs.push(qMoltODiv());qs.push(qTrappola());qs.push(qInversa());qs.push(qCatena());qs.push(qQualeCorretta());qs.push(qQuantiGruppi());qs.push(qConfronto());qs.push(qQuantiRestano());qs.push(qDivisoreNascosto());qs.push(qFrazione());qs.push(qDuePassi());var extra=[qTempo,qSoldi,qProprieta];qs.push(extra[ri(0,2)]());return shuffle(qs).slice(0,15)}
function buildBlitz(){var qs=[];var gens=[qNumericDiv,qQuanteVolte,qInversa,qTrappola,qCatena,qQualeCorretta,qQuantiGruppi,qDivisoreNascosto,qFrazione,qProprieta];for(var i=0;i<50;i++)qs.push(gens[ri(0,gens.length-1)]());return qs}
function buildVeroFalso(){var qs=[];for(var i=0;i<40;i++)qs.push(qTrueFalse());return qs}
function buildBoss(){var qs=[];var gens=[qNumericDiv,qGruppi,qMoltODiv,qTrappola,qInversa,qCatena,qQualeCorretta,qQuantiGruppi,qConfronto,qQuantiRestano,qDivisoreNascosto,qFrazione,qDuePassi,qTempo,qSoldi,qProprieta];for(var i=0;i<15;i++)qs.push(gens[ri(0,gens.length-1)]());return shuffle(qs)}

var cheers=['Fantastico! 🎉','Bravissima! ⭐','Perfetto! 💪','Esatto! 🌟','Super! 🚀','Grande! 🎯','Mitica! 💥','Wow! 🔥'];

function startMode(mode){
  ensureAudio();G.mode=mode;G.score=0;G.streak=0;G.bestStreak=0;G.current=0;G.answered=false;G.blitzCount=0;
  clearInterval(G.timerInterval);showScreen('gameArea');
  var timer=document.getElementById('gameTimer');var bossE=document.getElementById('bossEmoji');var bossBar=document.getElementById('bossHpBar');
  timer.classList.add('hidden');bossE.classList.add('hidden');bossBar.classList.add('hidden');
  if(mode==='classica'){G.questions=buildClassica();G.total=15;document.getElementById('gameModeLabel').innerHTML='📚 Classica'}
  else if(mode==='blitz'){G.questions=buildBlitz();G.total=G.questions.length;G.timer=60;document.getElementById('gameModeLabel').innerHTML='⚡ Blitz';timer.classList.remove('hidden');timer.textContent='60';timer.classList.remove('danger');G.timerInterval=setInterval(function(){G.timer--;timer.textContent=G.timer;if(G.timer<=10)timer.classList.add('danger');if(G.timer<=5)sfxTick();if(G.timer<=0){clearInterval(G.timerInterval);endGame()}},1000)}
  else if(mode==='verofalso'){G.questions=buildVeroFalso();G.total=G.questions.length;G.timer=45;document.getElementById('gameModeLabel').innerHTML='🎯 Vero o Falso';timer.classList.remove('hidden');timer.textContent='45';timer.classList.remove('danger');G.timerInterval=setInterval(function(){G.timer--;timer.textContent=G.timer;if(G.timer<=10)timer.classList.add('danger');if(G.timer<=5)sfxTick();if(G.timer<=0){clearInterval(G.timerInterval);endGame()}},1000)}
  else if(mode==='boss'){G.questions=buildBoss();G.total=G.questions.length;G.bossMaxHp=10;G.bossHp=10;document.getElementById('gameModeLabel').innerHTML='🧚 Sfida Magica';bossE.classList.remove('hidden');bossBar.classList.remove('hidden');bossE.className='boss-emoji';updateBossHp()}
  updateTopbar();renderQ();
}

function renderQ(){
  G.answered=false;if(G.current>=G.questions.length){endGame();return}
  var q=G.questions[G.current];var card=document.getElementById('qCard');card.style.animation='none';card.offsetHeight;card.style.animation='';
  var badge=document.getElementById('qBadge');var grid=document.getElementById('answersGrid');var fb=document.getElementById('fbArea');fb.classList.add('hidden');fb.innerHTML='';
  var combo=document.getElementById('comboDisp');if(G.streak>=3){combo.classList.remove('hidden');combo.textContent='x'+getMultiplier()}else combo.classList.add('hidden');
  if(G.mode==='classica')document.getElementById('progressBar').style.width=(G.current/G.total)*100+'%';
  else if(G.mode==='boss')document.getElementById('progressBar').style.width=((G.bossMaxHp-G.bossHp)/G.bossMaxHp)*100+'%';
  else document.getElementById('progressBar').style.width=Math.min((G.blitzCount/20)*100,100)+'%';
  if(q.type==='tf'){badge.className='q-badge badge-calc';badge.innerHTML='🎯 Vero o Falso';document.getElementById('qText').innerHTML=q.html;grid.innerHTML='';grid.className='tf-grid';
    var btnT=document.createElement('button');btnT.className='tf-btn tf-true';btnT.textContent='✅ VERO';
    var btnF=document.createElement('button');btnF.className='tf-btn tf-false';btnF.textContent='❌ FALSO';
    btnT.addEventListener('click',function(){checkTF(true,btnT,btnF,q)});btnF.addEventListener('click',function(){checkTF(false,btnF,btnT,q)});
    grid.appendChild(btnT);grid.appendChild(btnF);
  }else{grid.className='answers-grid';badge.className='q-badge '+q.cls;badge.innerHTML=q.badge;document.getElementById('qText').innerHTML=q.html;grid.innerHTML='';
    q.options.forEach(function(opt){var b=document.createElement('button');b.className='ans-btn'+(q.isText?' textual':'');b.textContent=opt;b.addEventListener('click',function(){checkAns(opt,b,q)});grid.appendChild(b)});
  }
}

function getMultiplier(){if(G.streak>=10)return 4;if(G.streak>=7)return 3;if(G.streak>=3)return 2;return 1}
function showXpToast(a){var t=document.createElement('div');t.className='xp-toast';t.textContent='+'+a+' XP';document.body.appendChild(t);setTimeout(function(){t.remove()},1000)}
function showStreakToast(text){var t=document.createElement('div');t.className='streak-toast';t.textContent=text;t.style.color='hsl('+ri(300,360)+',80%,65%)';document.body.appendChild(t);setTimeout(function(){t.remove()},1200)}

function handleCorrect(btn){
  sfxCorrect();btn.classList.add('correct');G.score++;G.streak++;if(currentProfile)currentProfile.totalCorrect++;
  if(G.streak>G.bestStreak)G.bestStreak=G.streak;
  var mult=getMultiplier();var xp=10*mult;addXP(xp);
  var rect=btn.getBoundingClientRect();burstParticles(rect.left+rect.width/2,rect.top+rect.height/2,'#A5D6A7',8);
  if(G.streak===3)showStreakToast('🔥 Combo x2!');if(G.streak===7)showStreakToast('🔥🔥 Combo x3!');if(G.streak===10){showStreakToast('💥 COMBO x4!');confettiBurst(30)}
  showXpToast(xp);
  if(G.mode==='boss'){G.bossHp--;updateBossHp();var be=document.getElementById('bossEmoji');be.className='boss-emoji hit';setTimeout(function(){if(G.bossHp>0)be.className='boss-emoji'},400);sfxBossHit();if(G.bossHp<=0)bossDefeated()}
  return cheers[ri(0,cheers.length-1)];
}
function handleWrong(btn){sfxWrong();btn.classList.add('wrong');G.streak=0;var rect=btn.getBoundingClientRect();burstParticles(rect.left+rect.width/2,rect.top+rect.height/2,'#EF9A9A',6);return encouragements[ri(0,encouragements.length-1)]}

function checkAns(selected,btn,q){
  if(G.answered)return;G.answered=true;
  var all=document.querySelectorAll('.ans-btn');for(var i=0;i<all.length;i++){if(all[i].textContent===q.correct)all[i].classList.add('correct');all[i].style.pointerEvents='none'}
  var ok=selected===q.correct;var msg=ok?handleCorrect(btn):handleWrong(btn);updateTopbar();G.blitzCount++;
  if(G.mode==='boss'&&G.bossHp<=0)return;
  showFeedback(ok,msg,q.explain);
  if(G.mode!=='classica')setTimeout(function(){G.current++;renderQ()},ok?700:1600);
}
function checkTF(val,btn,otherBtn,q){
  if(G.answered)return;G.answered=true;btn.style.pointerEvents='none';otherBtn.style.pointerEvents='none';
  var ok=val===q.correct;if(ok){btn.classList.add('correct');handleCorrect(btn)}else{btn.classList.add('wrong');otherBtn.classList.add('correct');handleWrong(btn)}
  showFeedback(ok,ok?cheers[ri(0,cheers.length-1)]:encouragements[ri(0,encouragements.length-1)],q.explain);updateTopbar();G.blitzCount++;
  setTimeout(function(){G.current++;renderQ()},ok?600:1500);
}
function showFeedback(ok,msg,explain){
  var fb=document.getElementById('fbArea');fb.classList.remove('hidden');
  var html='<div class="fb-msg '+(ok?'ok':'ko')+'">'+msg+'</div>';
  if(!ok)html+='<div class="fb-explain">💡 '+explain+'</div>';
  if(G.mode==='classica')html+='<button class="next-btn" id="nextQBtn">'+(G.current<G.total-1?'Avanti ➡️':'Risultato! 🏆')+'</button>';
  fb.innerHTML=html;
  var nBtn=document.getElementById('nextQBtn');if(nBtn)nBtn.addEventListener('click',function(){nextQ()});
}
function nextQ(){G.current++;if(G.current>=G.total)endGame();else renderQ()}
function updateBossHp(){document.getElementById('bossHpFill').style.width=(G.bossHp/G.bossMaxHp)*100+'%';document.getElementById('bossHpLabel').textContent=Math.max(G.bossHp,0)+' / '+G.bossMaxHp}
function bossDefeated(){sfxBossDefeat();document.getElementById('bossEmoji').className='boss-emoji defeated';confettiBurst(60);addXP(50);showXpToast(50);setTimeout(function(){endGame()},1200)}

function endGame(){
  clearInterval(G.timerInterval);
  if(currentProfile){currentProfile.gamesPlayed++;if(G.bestStreak>currentProfile.bestStreak)currentProfile.bestStreak=G.bestStreak;
    if(G.mode==='boss'&&G.bossHp<=0)awardTrophy('boss_win');
    if(G.mode==='classica'&&G.score===G.total)awardTrophy('perfect');
    if(G.mode==='blitz'&&G.score>=10)awardTrophy('blitz_10');
    if(G.mode==='blitz'&&G.score>=20)awardTrophy('blitz_20');
    var newTrophies=checkTrophies();saveCurrentProfile();
  }
  showScreen('endScreen');
  var total,pct,title,detail;
  if(G.mode==='blitz'||G.mode==='verofalso'){total=G.blitzCount;pct=total>0?G.score/total:0;document.getElementById('endScore').textContent=G.score+' ✓';detail=G.score+' risposte corrette su '+total+'!'}
  else if(G.mode==='boss'){total=G.total;pct=G.bossHp<=0?1:G.score/total;document.getElementById('endScore').textContent=G.bossHp<=0?'🧙‍♀️✨':'😢';detail=G.bossHp<=0?'Strega sconfitta con '+G.score+' risposte giuste!':'La strega ha vinto... riprova!'}
  else{total=G.total;pct=G.score/total;document.getElementById('endScore').textContent=G.score+'/'+total;detail='Miglior serie: '+G.bestStreak+' di fila!'}
  var stars=pct>=0.9?3:pct>=0.7?2:pct>=0.5?1:0;
  if(pct>=0.9)title='Sei un genio! 🧠✨';else if(pct>=0.7)title='Bravissima! 💪';else if(pct>=0.5)title='Buon lavoro! 👍';else title='Non mollare! 🌟';
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('endDetail').textContent=detail;
  document.getElementById('endXp').textContent='+'+G.score*10+' XP guadagnati!';
  document.getElementById('endTrophy').textContent=G.mode==='boss'?(G.bossHp<=0?'🧚':'😢'):'🏆';
  document.getElementById('endNewTrophies').textContent=newTrophies&&newTrophies.length>0?'Nuovo trofeo: '+newTrophies.join(', '):'';
  if(pct>=0.7)confettiBurst(40);
}

  document.getElementById('confirmNo').addEventListener('click',function(){fb.classList.add('hidden');fb.innerHTML=''});
});

</script>
