<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dividi & Conquista! 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --bg1:#FFF0F5;--bg2:#FDE8F0;--bg3:#F8D8E8;
  --ground:#E8F5E9;--ground2:#C8E6C9;
  --accent:#E91E8C;--accent2:#D81B8E;
  --gold:#FFB347;--gold2:#FFA726;
  --pink:#F48FB1;--pink2:#EC407A;
  --lilac:#CE93D8;--lilac2:#BA68C8;
  --mint:#80CBC4;--mint2:#4DB6AC;
  --green:#66BB6A;--red:#EF5350;
  --peach:#FFCCBC;
  --card:rgba(255,255,255,0.75);
  --card-solid:rgba(255,255,255,0.92);
  --text:#4A2040;--text-light:#7B5070;--text-dim:rgba(74,32,64,0.5);
  --radius:24px;--radius-sm:16px;
  --shadow:0 4px 24px rgba(200,100,150,0.12);
  --shadow-lg:0 8px 32px rgba(200,100,150,0.18);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Nunito Sans',sans-serif;
  background:linear-gradient(170deg,var(--bg1) 0%,var(--bg2) 35%,var(--bg3) 65%,var(--ground) 88%,var(--ground2) 100%);
  color:var(--text);
  display:flex;justify-content:center;
}
.app{
  width:100%;max-width:520px;height:100%;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

/* ===== FLOATING ELEMENTS (hearts, stars, flowers) ===== */
.stars{position:fixed;top:0;left:0;width:100%;height:85%;pointer-events:none;z-index:0}
.star{position:absolute;animation:floatUp var(--d) ease-in-out infinite alternate;opacity:0.35;font-size:var(--sz,14px)}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-12px) rotate(15deg)}}

/* ===== PARTICLES ===== */
.particle{position:fixed;pointer-events:none;z-index:999;border-radius:50%;animation:particleUp 0.8s ease-out forwards}
@keyframes particleUp{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
}

/* ===== TOP BAR ===== */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;z-index:10;flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.avatar-circle{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--lilac));
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;box-shadow:0 3px 12px rgba(236,64,122,0.25);
  border:3px solid white;
  transition:transform 0.3s;
}
.avatar-circle.levelup{animation:avatarPop 0.6s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes avatarPop{0%{transform:scale(1)}50%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1)}}
.player-info{display:flex;flex-direction:column;gap:2px}
.player-level{font-family:'Baloo 2',cursive;font-size:0.85rem;font-weight:700;color:var(--accent)}
.xp-bar-wrap{width:80px;height:7px;background:rgba(206,147,216,0.25);border-radius:10px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--lilac));border-radius:10px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1)}

.topbar-right{display:flex;gap:10px;align-items:center}
.stat-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--card);backdrop-filter:blur(10px);
  padding:6px 14px;border-radius:20px;
  font-weight:800;font-size:0.85rem;
  box-shadow:0 2px 8px rgba(200,100,150,0.1);
  color:var(--text);
}

/* ===== GAME MODE SELECTOR ===== */
.mode-select{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;z-index:10;gap:20px;
}
.mode-title{
  font-family:'Baloo 2',cursive;font-size:2.2rem;font-weight:800;
  text-align:center;line-height:1.2;
  background:linear-gradient(135deg,var(--pink2),var(--lilac2),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.mode-subtitle{color:var(--text-dim);text-align:center;font-size:0.95rem;margin-top:-8px}
.modes-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
  width:100%;max-width:400px;
}
button.mode-card,
.mode-card{
  -webkit-appearance:none;appearance:none;
  font:inherit;
  background:var(--card);backdrop-filter:blur(12px);
  border:2px solid rgba(236,64,122,0.12);
  border-radius:var(--radius);padding:20px 14px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all 0.25s;
  text-align:center;position:relative;overflow:hidden;
  box-shadow:var(--shadow);color:var(--text);
}
.mode-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.4));
  pointer-events:none;
}
.mode-card:active{transform:scale(0.95)}
.mode-card:hover{border-color:var(--pink);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.mode-emoji{font-size:2.4rem}
.mode-name{font-family:'Baloo 2',cursive;font-weight:700;font-size:1.05rem;color:var(--text)}
.mode-desc{font-size:0.75rem;color:var(--text-dim);line-height:1.3}
.mode-card.locked{opacity:0.45;pointer-events:none}
.mode-card.locked::after{
  content:'🔒';position:absolute;top:8px;right:8px;font-size:1rem;
}

/* ===== GAME AREA ===== */
.game-area{
  flex:1;display:flex;flex-direction:column;
  padding:0 16px 16px;z-index:10;
  animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.game-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.game-mode-label{
  font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;
  display:flex;align-items:center;gap:6px;color:var(--text);
}
.game-timer{
  font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;
  color:var(--accent);min-width:60px;text-align:right;
}
.game-timer.danger{color:var(--red);animation:pulse 0.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.progress-track{
  height:10px;background:rgba(206,147,216,0.2);border-radius:10px;
  margin-bottom:14px;overflow:hidden;
}
.progress-bar{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,var(--pink),var(--lilac),var(--gold));
  transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

/* ===== QUESTION CARD ===== */
.q-card{
  background:var(--card-solid);
  border:2px solid rgba(236,64,122,0.08);
  border-radius:var(--radius);padding:24px 20px;
  box-shadow:var(--shadow-lg);
  flex:1;display:flex;flex-direction:column;
  animation:cardFlip 0.35s ease-out;
  position:relative;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
@keyframes cardFlip{
  0%{opacity:0;transform:perspective(600px) rotateY(-8deg) scale(0.96)}
  100%{opacity:1;transform:perspective(600px) rotateY(0) scale(1)}
}
.q-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  font-size:0.75rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px;
  align-self:flex-start;margin-bottom:12px;
}
.badge-calc{background:rgba(186,104,200,0.15);color:var(--lilac2)}
.badge-brain{background:rgba(102,187,106,0.15);color:var(--green)}
.badge-trap{background:rgba(236,64,122,0.12);color:var(--pink2)}
.badge-boss{background:rgba(255,179,71,0.18);color:#E65100}

.q-text{
  font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:600;
  line-height:1.4;margin-bottom:20px;flex-shrink:0;color:var(--text);
}
.q-text .num{font-size:2.2rem;font-weight:800;color:var(--accent)}
.q-text .op{font-size:1.8rem;color:var(--lilac2);margin:0 6px}

.answers-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-top:auto;
}
.ans-btn{
  background:rgba(248,216,232,0.4);
  border:2px solid rgba(236,64,122,0.15);
  border-radius:var(--radius-sm);padding:16px 10px;
  font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:700;
  color:var(--text);cursor:pointer;
  transition:all 0.15s;text-align:center;line-height:1.3;
  -webkit-user-select:none;user-select:none;
}
.ans-btn.textual{font-family:'Nunito Sans',sans-serif;font-size:0.95rem;font-weight:700}
.ans-btn:active{transform:scale(0.93)}
.ans-btn:hover{border-color:var(--pink);background:rgba(244,143,177,0.2)}
.ans-btn.correct{
  background:rgba(102,187,106,0.2);border-color:var(--green);
  animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.ans-btn.wrong{
  background:rgba(239,83,80,0.15);border-color:var(--red);
  animation:shake 0.4s;
}
@keyframes popIn{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

/* ===== FEEDBACK ===== */
.fb-area{margin-top:12px;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fb-msg{
  padding:12px 16px;border-radius:var(--radius-sm);
  font-weight:700;font-size:0.95rem;text-align:center;
}
.fb-msg.ok{background:rgba(102,187,106,0.15);color:#2E7D32}
.fb-msg.ko{background:rgba(239,83,80,0.12);color:#C62828}
.fb-explain{
  margin-top:8px;padding:10px 14px;
  background:rgba(186,104,200,0.1);border-radius:var(--radius-sm);
  font-size:0.85rem;color:var(--lilac2);line-height:1.5;
}
.xp-toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Baloo 2',cursive;font-size:2.5rem;font-weight:800;
  color:var(--gold);text-shadow:0 0 20px rgba(255,179,71,0.5);
  z-index:1000;pointer-events:none;
  animation:xpFloat 1s ease-out forwards;
}
@keyframes xpFloat{
  0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}
  30%{opacity:1;transform:translate(-50%,-60%) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-120%) scale(0.8)}
}
.streak-toast{
  position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);
  font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;
  z-index:1000;pointer-events:none;
  animation:streakPop 1.2s ease-out forwards;
  text-shadow:0 0 16px rgba(236,64,122,0.4);
}
@keyframes streakPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(-10deg)}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(5deg)}
  40%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}
  100%{opacity:0;transform:translate(-50%,-80%) scale(0.7)}
}

.next-btn{
  margin-top:10px;
  background:linear-gradient(135deg,var(--pink),var(--lilac));
  border:none;border-radius:var(--radius-sm);padding:14px;
  font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:700;
  color:white;cursor:pointer;width:100%;
  transition:transform 0.2s;box-shadow:0 3px 12px rgba(236,64,122,0.2);
}
.next-btn:active{transform:scale(0.96)}
.back-btn{
  background:none;border:2px solid rgba(236,64,122,0.15);
  border-radius:var(--radius-sm);padding:10px 20px;
  font-family:'Baloo 2',cursive;font-size:0.9rem;font-weight:700;
  color:var(--text-dim);cursor:pointer;margin-top:8px;width:100%;
}

/* ===== TRUE/FALSE BUTTONS ===== */
.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:auto}
.tf-btn{
  padding:20px;border-radius:var(--radius);
  font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;
  cursor:pointer;border:3px solid transparent;
  transition:all 0.15s;-webkit-user-select:none;user-select:none;
}
.tf-btn:active{transform:scale(0.93)}
.tf-true{background:rgba(102,187,106,0.12);color:var(--green);border-color:rgba(102,187,106,0.25)}
.tf-false{background:rgba(239,83,80,0.1);color:var(--red);border-color:rgba(239,83,80,0.2)}
.tf-btn.correct{animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.tf-btn.wrong{animation:shake 0.4s}

/* ===== BOSS BATTLE ===== */
.boss-hp-bar{
  height:14px;background:rgba(206,147,216,0.2);border-radius:10px;
  margin-bottom:16px;overflow:hidden;position:relative;
}
.boss-hp-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,var(--gold),var(--pink));
  transition:width 0.5s;
}
.boss-hp-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:800;color:var(--text);
}
.boss-emoji{font-size:3rem;text-align:center;margin-bottom:8px;animation:bossIdle 2s infinite}
@keyframes bossIdle{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(3deg)}}
.boss-emoji.hit{animation:bossHit 0.4s}
@keyframes bossHit{0%{transform:scale(1)}30%{transform:scale(0.8) rotate(-15deg)}70%{transform:scale(1.1) rotate(5deg)}100%{transform:scale(1)}}
.boss-emoji.defeated{animation:bossDefeat 1s forwards}
@keyframes bossDefeat{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3) rotate(20deg)}100%{transform:scale(0) rotate(180deg);opacity:0}}

/* ===== END SCREEN ===== */
.end-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;text-align:center;padding:20px;gap:12px;
}
.end-trophy{font-size:4.5rem;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.end-title{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--text)}
.end-score{font-family:'Baloo 2',cursive;font-size:3.5rem;font-weight:800;color:var(--accent)}
.end-stars{font-size:2.2rem;letter-spacing:8px}
.end-detail{font-size:0.9rem;color:var(--text-dim);max-width:280px;line-height:1.5}
.end-xp{font-family:'Baloo 2',cursive;font-size:1.2rem;color:var(--lilac2);margin:4px 0}
.play-again-btn{
  background:linear-gradient(135deg,var(--pink),var(--lilac));
  border:none;border-radius:24px;padding:16px 40px;
  font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:700;
  color:white;cursor:pointer;box-shadow:0 4px 20px rgba(236,64,122,0.25);
  margin-top:8px;
}

/* ===== COMBO DISPLAY ===== */
.combo-display{
  position:absolute;top:8px;right:12px;
  font-family:'Baloo 2',cursive;font-weight:800;font-size:0.85rem;
  color:var(--pink2);opacity:0.9;
}

/* ===== RESPONSIVE ===== */
@media(min-width:768px){
  .q-text{font-size:1.65rem}
  .q-text .num{font-size:2.5rem}
  .ans-btn{font-size:1.4rem;padding:18px}
  .mode-title{font-size:2.6rem}
}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- STARS -->
  <div class="stars" id="stars"></div>

  <!-- TOP BAR (always visible during game) -->
  <div class="topbar hidden" id="topbar">
    <div class="topbar-left">
      <div class="avatar-circle" id="avatar">🌷</div>
      <div class="player-info">
        <div class="player-level" id="levelLabel">Livello 1</div>
        <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="stat-pill">⭐ <span id="totalScore">0</span></div>
      <div class="stat-pill">🔥 <span id="streakDisp">0</span></div>
    </div>
  </div>

  <!-- SCREEN: MODE SELECT -->
  <div class="mode-select" id="modeSelect">
    <div class="mode-title">Dividi &<br>Conquista! 🌸</div>
    <div class="mode-subtitle">Scegli la tua avventura!</div>
    <div class="modes-grid">
      <button class="mode-card" id="modeClassica">
        <div class="mode-emoji">📚</div>
        <div class="mode-name">Classica</div>
        <div class="mode-desc">15 domande, tutto il tempo che vuoi</div>
      </button>
      <button class="mode-card" id="modeBlitz">
        <div class="mode-emoji">⚡</div>
        <div class="mode-name">Blitz</div>
        <div class="mode-desc">Quante ne riesci in 60 secondi?</div>
      </button>
      <button class="mode-card" id="modeVeroFalso">
        <div class="mode-emoji">🎯</div>
        <div class="mode-name">Vero o Falso</div>
        <div class="mode-desc">Velocità e intuito! Risposte lampo</div>
      </button>
      <button class="mode-card" id="modeBoss">
        <div class="mode-emoji">🧚</div>
        <div class="mode-name">Sfida Magica</div>
        <div class="mode-desc">Sconfiggi la strega rispondendo!</div>
      </button>
    </div>
  </div>

  <!-- SCREEN: GAME -->
  <div class="game-area hidden" id="gameArea">
    <div class="game-header">
      <div class="game-mode-label" id="gameModeLabel">📚 Classica</div>
      <div class="game-timer hidden" id="gameTimer">60</div>
    </div>
    <div class="progress-track"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

    <!-- Boss HP (only boss mode) -->
    <div class="boss-emoji hidden" id="bossEmoji">🧙‍♀️</div>
    <div class="boss-hp-bar hidden" id="bossHpBar">
      <div class="boss-hp-fill" id="bossHpFill" style="width:100%"></div>
      <div class="boss-hp-label" id="bossHpLabel">10 / 10</div>
    </div>

    <div class="q-card" id="qCard">
      <div class="combo-display hidden" id="comboDisp">x2</div>
      <div class="q-badge badge-calc" id="qBadge">🔢 Calcolo</div>
      <div class="q-text" id="qText"></div>
      <div class="answers-grid" id="answersGrid"></div>
      <div class="fb-area hidden" id="fbArea"></div>
    </div>
  </div>

  <!-- SCREEN: END -->
  <div class="end-screen hidden" id="endScreen">
    <div class="end-trophy" id="endTrophy">🏆</div>
    <div class="end-title" id="endTitle">Bravissima!</div>
    <div class="end-score" id="endScore">0</div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-xp" id="endXp"></div>
    <div class="end-detail" id="endDetail"></div>
    <button class="play-again-btn" id="playAgainBtn">Torna al menù 🏠</button>
  </div>
</div>

<script>
// =============================================
// AUDIO (Web Audio API - simple synth sounds)
// =============================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type='sine',vol=0.15){
  try{
    ensureAudio();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxCorrect(){playTone(784,0.12,'triangle',0.1);setTimeout(()=>playTone(988,0.12,'triangle',0.1),100);setTimeout(()=>playTone(1175,0.18,'triangle',0.08),200)}
function sfxWrong(){playTone(392,0.2,'sine',0.07);setTimeout(()=>playTone(349,0.25,'sine',0.06),150)}
function sfxLevelUp(){[784,988,1175,1568].forEach((f,i)=>setTimeout(()=>playTone(f,0.18,'triangle',0.08),i*120))}
function sfxBossHit(){playTone(523,0.12,'triangle',0.08);setTimeout(()=>playTone(659,0.1,'triangle',0.07),80)}
function sfxBossDefeat(){[784,988,1175,1319,1480,1568].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'triangle',0.07),i*100))}
function sfxTick(){playTone(1047,0.04,'sine',0.04)}

// =============================================
// STARS
// =============================================
try{(function initStars(){

function burstParticles(x,y,color,count=12){
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    const angle=Math.random()*Math.PI*2,dist=40+Math.random()*60;
    const dx=Math.cos(angle)*dist,dy=Math.sin(angle)*dist;
    const size=4+Math.random()*6;
    p.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};--dx:${dx}px;--dy:${dy}px`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

function confettiBurst(count=50){
  const colors=['#F48FB1','#CE93D8','#FFB347','#80CBC4','#F8BBD0','#B39DDB','#FFCC80','#A5D6A7'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    const x=Math.random()*window.innerWidth,y=-10;
    const dx=(Math.random()-0.5)*200,dy=window.innerHeight*0.6+Math.random()*200;
    const size=5+Math.random()*8;
    p.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${dx}px;--dy:${dy}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.4}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),2500);
  }
}

// =============================================
let G={
  // Persistent (saved to storage)
  xp:0, level:1, totalCorrect:0,
  // Session
  mode:'', score:0, streak:0, bestStreak:0,
  current:0, questions:[], answered:false,
  total:15, timer:0, timerInterval:null,
  bossHp:0, bossMaxHp:0, blitzCount:0,
};

const AVATARS=['🌷','🌸','🦋','🌺','🦄','🌈','👸','💎','💫','👑'];
const LEVEL_NAMES=['Fiorellino','Farfallina','Stellina','Esploratrice','Fatina','Principessa','Regina','Leggenda'];
const XP_PER_LEVEL=100;

function xpForLevel(lvl){return lvl*XP_PER_LEVEL}
function getAvatar(){return AVATARS[Math.min(G.level-1,AVATARS.length-1)]}
function getLevelName(){return LEVEL_NAMES[Math.min(G.level-1,LEVEL_NAMES.length-1)]}

function loadProgress(){
  try{
    if(typeof localStorage==='undefined')return;
    const raw=localStorage.getItem('dc2_progress');
    if(!raw)return;
    const d=JSON.parse(raw);
    G.xp=d.xp||0;G.level=d.level||1;G.totalCorrect=d.totalCorrect||0;
  }catch(e){}
}
function saveProgress(){
  try{
    if(typeof localStorage==='undefined')return;
    localStorage.setItem('dc2_progress',JSON.stringify({xp:G.xp,level:G.level,totalCorrect:G.totalCorrect}));
  }catch(e){}
}

function addXP(amount){
  G.xp+=amount;
  let leveled=false;
  while(G.xp>=xpForLevel(G.level)){
    G.xp-=xpForLevel(G.level);
    G.level++;
    leveled=true;
  }
  if(leveled){
    sfxLevelUp();
    document.getElementById('avatar').classList.add('levelup');
    setTimeout(()=>document.getElementById('avatar').classList.remove('levelup'),700);
    showStreakToast(`⬆️ Livello ${G.level}!`);
  }
  updateTopbar();
  saveProgress();
}

function updateTopbar(){
  document.getElementById('avatar').textContent=getAvatar();
  document.getElementById('levelLabel').textContent=`Lv.${G.level} ${getLevelName()}`;
  document.getElementById('xpBar').style.width=`${(G.xp/xpForLevel(G.level))*100}%`;
  document.getElementById('totalScore').textContent=G.score;
  document.getElementById('streakDisp').textContent=G.streak;
}

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function wrongAnswers(c,n,min,max){
  const w=new Set();
  [-2,-1,1,2,-3,3].forEach(d=>{const v=c+d;if(v>0&&v!==c&&v>=min&&v<=max)w.add(v)});
  let t=0;while(w.size<n&&t<50){const v=ri(min,max);if(v!==c)w.add(v);t++}
  return shuffle([...w]).slice(0,n);
}

// NEW: "Which division is correct?" (pick the right equation)
function qQualeCorretta(){
  const d=ri(2,10),q=ri(2,10),dd=d*q;
  const correct=`${dd} ÷ ${d} = ${q}`;
  const wrongs=[];
  // Generate plausible wrong equations
  const fakes=[
    `${dd} ÷ ${d} = ${q+ri(1,3)}`,
    `${dd} ÷ ${q} = ${d+ri(1,2)}`,
    `${dd+d} ÷ ${d} = ${q}`,
    `${dd} ÷ ${d+1} = ${q}`,
    `${d*q+d} ÷ ${d} = ${q}`,
    `${dd} ÷ ${d} = ${q*2}`,
  ];
  shuffle(fakes).slice(0,3).forEach(f=>wrongs.push(f));
  const opts=shuffle([correct,...wrongs]);
  return{type:'trap',badge:'⚡ Trappola!',cls:'badge-trap',
    html:`Quale di queste divisioni è <strong>corretta</strong>?`,
    options:opts,correct,explain:`${dd} ÷ ${d} = ${q} perché ${d} × ${q} = ${dd}`,isText:true};
}

// NEW: Comparison — which is bigger?
function qConfronto(){
  const d1=ri(2,10),q1=ri(2,10),dd1=d1*q1;
  let d2,q2,dd2;
  do{d2=ri(2,10);q2=ri(2,10);dd2=d2*q2}while(q1===q2);
  const bigger=q1>q2?`${dd1} ÷ ${d1}`:`${dd2} ÷ ${d2}`;
  const smaller=q1>q2?`${dd2} ÷ ${d2}`:`${dd1} ÷ ${d1}`;
  const same1=`Sono uguali`;
  const fakeDiv=`${ri(10,50)} ÷ ${ri(2,8)}`;
  const opts=shuffle([bigger,smaller,same1,fakeDiv]);
  return{type:'brain',badge:'🧠 Ragionamento',cls:'badge-brain',
    html:`Quale di queste divisioni dà il numero più grande?`,
    options:opts,correct:bigger,
    explain:`${dd1} ÷ ${d1} = ${q1} e ${dd2} ÷ ${d2} = ${q2}. Quindi ${Math.max(q1,q2)} è il risultato più grande!`,isText:true};
}

  const divise=it.g==='f'?'divise':'divisi';

}

// TRUE/FALSE generator — now with multiple question styles
function qTrueFalse(){
  const style=ri(0,3);
  if(style<=1){
    // Classic: is this division correct?
    const d=ri(2,10),q=ri(1,10),dd=d*q;
    const isTrue=ri(0,1)===1;
    let shown,correct;
    if(isTrue){shown=q;correct=true}
    else{
      let fake=q+ri(1,3)*(ri(0,1)?1:-1);
      if(fake<=0)fake=q+ri(1,3);
      if(fake===q)fake=q+1;
      shown=fake;correct=false;
    }
    return{type:'tf',
      html:`<span class="num">${dd}</span> <span class="op">÷</span> <span class="num">${d}</span> <span class="op">=</span> <span class="num">${shown}</span>`,
      correct,explain:correct?`Esatto! ${dd} ÷ ${d} = ${shown}`:`No! ${dd} ÷ ${d} = ${q}, non ${shown}!`};
  }else if(style===2){
    // "X is bigger than Y" — true or false
    const d1=ri(2,10),q1=ri(2,10),dd1=d1*q1;
    const d2=ri(2,10),q2=ri(2,10),dd2=d2*q2;
    if(q1===q2)return qTrueFalse(); // retry
    const claimBigger=ri(0,1)===0;// claim first is bigger
    const actuallyBigger=q1>q2;
    const correct=claimBigger===actuallyBigger;
    return{type:'tf',
      html:`<span class="num">${dd1}</span> <span class="op">÷</span> <span class="num">${d1}</span> è più grande di <span class="num">${dd2}</span> <span class="op">÷</span> <span class="num">${d2}</span>`,
      correct,explain:`${dd1} ÷ ${d1} = ${q1} e ${dd2} ÷ ${d2} = ${q2}. ${q1>q2?'Il primo':'Il secondo'} è più grande!`};
  }else{
    // "This is a division problem" — describe scenario, true/false
    const isDivision=ri(0,1)===1;
    let text,correct,explain;
    if(isDivision){
      const divScenarios=[
        {t:'Dividere 20 mele tra 5 bambini è una divisione',e:'Dividere in parti uguali → divisione!'},
        {t:'Per sapere quante figurine ha ogni amico, dividi il totale per il numero di amici',e:'Distribuire equamente = divisione!'},
        {t:'Se hai 36 biscotti e fai 4 gruppi uguali, stai dividendo',e:'Fare gruppi uguali = divisione!'},
        {t:'Per sapere quante sedie ci sono per fila, dividi il totale per il numero di file',e:'Distribuire in file uguali = divisione!'},
        {t:'Scoprire quanti pezzi ci sono per scatola, partendo dal totale, è una divisione',e:'Dal totale alle parti = divisione!'},
        {t:'Se hai 42 figurine e le dai a 7 amici in parti uguali, fai una divisione',e:'Parti uguali tra amici = divisione!'},
      ];
      const s=divScenarios[ri(0,divScenarios.length-1)];
      text=s.t;correct=true;explain=s.e;
    }else{
      const multScenarios=[
        {t:'Dividere 20 mele tra 5 bambini è una moltiplicazione',e:'Dividere in parti uguali → è una DIVISIONE, non una moltiplicazione!'},
        {t:'Per trovare il totale di 5 scatole da 8 biscotti devi dividere',e:'Ripetere una quantità → è una MOLTIPLICAZIONE, non una divisione!'},
        {t:'Se ogni bambino ha 3 giocattoli e i bambini sono 6, per trovare il totale devi dividere',e:'Per trovare il totale → MOLTIPLICHI, non dividi!'},
        {t:'Per calcolare 7 × 4 devi dividere 7 per 4',e:'7 × 4 è una moltiplicazione, non una divisione!'},
        {t:'Per contare le zampe di 6 gatti fai una divisione',e:'Ogni gatto ha 4 zampe, ripeti per 6 → MOLTIPLICAZIONE!'},
        {t:'Se hai 8 amici e ognuno porta 3 dolci, per trovare il totale devi dividere',e:'Ripeti 3 per 8 volte → MOLTIPLICAZIONE!'},
      ];
      const s=multScenarios[ri(0,multScenarios.length-1)];
      text=s.t;correct=false;explain=s.e;
    }
    return{type:'tf',html:text,correct,explain};
  }
}

// BUILD QUESTION SETS
// =============================================
function buildClassica(){
  const qs=[];
  for(let i=0;i<3;i++)qs.push(qNumericDiv());
  for(let i=0;i<2;i++)qs.push(qQuanteVolte());
  for(let i=0;i<2;i++)qs.push(qGruppi());
  for(let i=0;i<2;i++)qs.push(qMoltODiv());
  for(let i=0;i<2;i++)qs.push(qTrappola());
  qs.push(qInversa());
  qs.push(qCatena());
  qs.push(qQualeCorretta());
  qs.push(qQuantiGruppi());
  qs.push(qConfronto());
  qs.push(qQuantiRestano());
  return shuffle(qs).slice(0,15);
}
function buildBlitz(){
  const qs=[];
  const generators=[qNumericDiv,qQuanteVolte,qInversa,qTrappola,qCatena,qQualeCorretta,qQuantiGruppi];
  for(let i=0;i<50;i++){
    qs.push(generators[ri(0,generators.length-1)]());
  }
  return qs;
}
function buildVeroFalso(){
  const qs=[];
  for(let i=0;i<40;i++)qs.push(qTrueFalse());
  return qs;
}
function buildBoss(){
  const qs=[];
  const generators=[qNumericDiv,qGruppi,qMoltODiv,qTrappola,qInversa,qCatena,qQualeCorretta,qQuantiGruppi,qConfronto,qQuantiRestano];
  for(let i=0;i<15;i++){
    qs.push(generators[ri(0,generators.length-1)]());
  }
  return shuffle(qs);
}

// GAME FLOW
// =============================================
function goToMenu(){
  clearInterval(G.timerInterval);
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('topbar').classList.add('hidden');
  document.getElementById('modeSelect').classList.remove('hidden');
  updateTopbar();
}

function startMode(mode){
  ensureAudio();
  G.mode=mode;G.score=0;G.streak=0;G.bestStreak=0;G.current=0;G.answered=false;G.blitzCount=0;
  clearInterval(G.timerInterval);

  document.getElementById('modeSelect').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('topbar').classList.remove('hidden');
  document.getElementById('gameArea').classList.remove('hidden');

  const timer=document.getElementById('gameTimer');
  const bossE=document.getElementById('bossEmoji');
  const bossBar=document.getElementById('bossHpBar');
  timer.classList.add('hidden');
  bossE.classList.add('hidden');
  bossBar.classList.add('hidden');

  if(mode==='classica'){
    G.questions=buildClassica();G.total=15;
    document.getElementById('gameModeLabel').innerHTML='📚 Classica';
  }else if(mode==='blitz'){
    G.questions=buildBlitz();G.total=G.questions.length;G.timer=60;
    document.getElementById('gameModeLabel').innerHTML='⚡ Blitz';
    timer.classList.remove('hidden');
    timer.textContent='60';timer.classList.remove('danger');
    G.timerInterval=setInterval(()=>{
      G.timer--;timer.textContent=G.timer;
      if(G.timer<=10)timer.classList.add('danger');
      if(G.timer<=5)sfxTick();
      if(G.timer<=0){clearInterval(G.timerInterval);endGame()}
    },1000);
  }else if(mode==='verofalso'){
    G.questions=buildVeroFalso();G.total=G.questions.length;G.timer=45;
    document.getElementById('gameModeLabel').innerHTML='🎯 Vero o Falso';
    timer.classList.remove('hidden');
    timer.textContent='45';timer.classList.remove('danger');
    G.timerInterval=setInterval(()=>{
      G.timer--;timer.textContent=G.timer;
      if(G.timer<=10)timer.classList.add('danger');
      if(G.timer<=5)sfxTick();
      if(G.timer<=0){clearInterval(G.timerInterval);endGame()}
    },1000);
  }else if(mode==='boss'){
    G.questions=buildBoss();G.total=G.questions.length;
    G.bossMaxHp=10;G.bossHp=10;
    document.getElementById('gameModeLabel').innerHTML='🧚 Sfida Magica';
    bossE.classList.remove('hidden');bossBar.classList.remove('hidden');
    bossE.className='boss-emoji';
    updateBossHp();
  }
  updateTopbar();
  renderQ();
}

function renderQ(){
  G.answered=false;
  if(G.current>=G.questions.length){endGame();return}
  const q=G.questions[G.current];
  const card=document.getElementById('qCard');
  card.style.animation='none';card.offsetHeight;card.style.animation='';

  const badge=document.getElementById('qBadge');
  const grid=document.getElementById('answersGrid');
  const fb=document.getElementById('fbArea');
  fb.classList.add('hidden');fb.innerHTML='';

  const combo=document.getElementById('comboDisp');
  if(G.streak>=3){combo.classList.remove('hidden');combo.textContent=`x${getMultiplier()}`}
  else combo.classList.add('hidden');

  // Progress
  if(G.mode==='classica')document.getElementById('progressBar').style.width=`${(G.current/G.total)*100}%`;
  else if(G.mode==='boss')document.getElementById('progressBar').style.width=`${((G.bossMaxHp-G.bossHp)/G.bossMaxHp)*100}%`;
  else document.getElementById('progressBar').style.width=`${Math.min((G.blitzCount/20)*100,100)}%`;

  if(q.type==='tf'){
    // True/False mode
    badge.className='q-badge badge-calc';badge.innerHTML='🎯 Vero o Falso';
    document.getElementById('qText').innerHTML=q.html;
    grid.innerHTML='';
    const btnT=document.createElement('button');
    btnT.className='tf-btn tf-true';btnT.textContent='✅ VERO';
    btnT.addEventListener('click',function(){checkTF(true,btnT,btnF,q)});
    const btnF=document.createElement('button');
    btnF.className='tf-btn tf-false';btnF.textContent='❌ FALSO';
    btnF.addEventListener('click',function(){checkTF(false,btnF,btnT,q)});
    grid.className='tf-grid';
    grid.appendChild(btnT);grid.appendChild(btnF);
  }else{
    // Regular MC
    grid.className='answers-grid';
    badge.className=`q-badge ${q.cls}`;badge.innerHTML=q.badge;
    document.getElementById('qText').innerHTML=q.html;
    grid.innerHTML='';
    q.options.forEach(opt=>{
      const b=document.createElement('button');
      b.className='ans-btn'+(q.isText?' textual':'');
      b.textContent=opt;
      b.addEventListener('click',function(){checkAns(opt,b,q)});
      grid.appendChild(b);
    });
  }
}

function getMultiplier(){
  if(G.streak>=10)return 4;
  if(G.streak>=7)return 3;
  if(G.streak>=3)return 2;
  return 1;
}

function showXpToast(amount){
  const t=document.createElement('div');t.className='xp-toast';
  t.textContent=`+${amount} XP`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1000);
}

function showStreakToast(text){
  const t=document.createElement('div');t.className='streak-toast';
  t.textContent=text;t.style.color=`hsl(${ri(300,360)},80%,65%)`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1200);
}

const cheers=['Fantastico! 🎉','Bravissima! ⭐','Perfetto! 💪','Esatto! 🌟','Super! 🚀','Grande! 🎯','Mitica! 💥','Wow! 🔥'];
const encouragements=['Quasi! 💪','Ci sei vicina! 🌈','Riprova! 😊','Non mollare! 💫','Dai che ce la fai! 🌟'];

function handleCorrect(btn){
  sfxCorrect();
  btn.classList.add('correct');
  G.score++;G.streak++;G.totalCorrect++;
  if(G.streak>G.bestStreak)G.bestStreak=G.streak;

  const mult=getMultiplier();
  const xp=10*mult;
  addXP(xp);

  const rect=btn.getBoundingClientRect();
  burstParticles(rect.left+rect.width/2,rect.top+rect.height/2,'#A5D6A7',8);

  if(G.streak===3)showStreakToast('🔥 Combo x2!');
  if(G.streak===7)showStreakToast('🔥🔥 Combo x3!');
  if(G.streak===10){showStreakToast('💥 COMBO x4!');confettiBurst(30)}

  showXpToast(xp);

  if(G.mode==='boss'){
    G.bossHp--;updateBossHp();
    const be=document.getElementById('bossEmoji');
    be.className='boss-emoji hit';setTimeout(()=>{if(G.bossHp>0)be.className='boss-emoji'},400);
    sfxBossHit();
    if(G.bossHp<=0){bossDefeated()}
  }

  return cheers[ri(0,cheers.length-1)];
}

function handleWrong(btn){
  sfxWrong();
  btn.classList.add('wrong');
  G.streak=0;

  const rect=btn.getBoundingClientRect();
  burstParticles(rect.left+rect.width/2,rect.top+rect.height/2,'#EF9A9A',6);

  return encouragements[ri(0,encouragements.length-1)];
}

function checkAns(selected,btn,q){
  if(G.answered)return;
  G.answered=true;
  document.querySelectorAll('.ans-btn').forEach(b=>{
    if(b.textContent===q.correct)b.classList.add('correct');
    b.style.pointerEvents='none';
  });
  const ok=selected===q.correct;
  const msg=ok?handleCorrect(btn):handleWrong(btn);
  updateTopbar();
  G.blitzCount++;

  // Boss: if defeated, handleCorrect already triggered endGame via bossDefeated
  if(G.mode==='boss'&&G.bossHp<=0) return;

  showFeedback(ok,msg,q.explain);

  if(G.mode==='classica'){
    // classica uses next button (added inside showFeedback)
  }else{
    // blitz, verofalso, boss: auto-advance
    setTimeout(()=>{G.current++;renderQ()},ok?700:1600);
  }
}

function checkTF(val,btn,otherBtn,q){
  if(G.answered)return;
  G.answered=true;
  btn.style.pointerEvents='none';otherBtn.style.pointerEvents='none';
  const ok=val===q.correct;
  if(ok){btn.classList.add('correct');handleCorrect(btn)}
  else{btn.classList.add('wrong');otherBtn.classList.add('correct');handleWrong(btn)}
  showFeedback(ok,ok?cheers[ri(0,cheers.length-1)]:encouragements[ri(0,encouragements.length-1)],q.explain);
  updateTopbar();
  G.blitzCount++;
  setTimeout(()=>{G.current++;renderQ()},ok?600:1500);
}

function showFeedback(ok,msg,explain){
  const fb=document.getElementById('fbArea');
  fb.classList.remove('hidden');
  let html=`<div class="fb-msg ${ok?'ok':'ko'}">${msg}</div>`;
  if(!ok)html+=`<div class="fb-explain">💡 ${explain}</div>`;

  if(G.mode==='classica'){
    html+=`<button class="next-btn" id="nextQBtn">${G.current<G.total-1?'Avanti ➡️':'Risultato! 🏆'}</button>`;
  }
  fb.innerHTML=html;
  const nBtn=document.getElementById('nextQBtn');
  if(nBtn)nBtn.addEventListener('click',function(){nextQ()});
}

function nextQ(){G.current++;if(G.current>=G.total)endGame();else renderQ()}

function updateBossHp(){
  document.getElementById('bossHpFill').style.width=`${(G.bossHp/G.bossMaxHp)*100}%`;
  document.getElementById('bossHpLabel').textContent=`${Math.max(G.bossHp,0)} / ${G.bossMaxHp}`;
}

function bossDefeated(){
  sfxBossDefeat();
  const be=document.getElementById('bossEmoji');
  be.className='boss-emoji defeated';
  confettiBurst(60);
  addXP(50);showXpToast(50);
  setTimeout(()=>endGame(),1200);
}

// =============================================
// END GAME
// =============================================
function endGame(){
  clearInterval(G.timerInterval);
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');

  let total,pct,title,detail;
  if(G.mode==='blitz'||G.mode==='verofalso'){
    total=G.blitzCount;pct=total>0?G.score/total:0;
    document.getElementById('endScore').textContent=`${G.score} ✓`;
    detail=`${G.score} risposte corrette su ${total} in ${G.mode==='blitz'?'60':'45'} secondi!`;
  }else if(G.mode==='boss'){
    total=G.total;pct=G.bossHp<=0?1:G.score/total;
    document.getElementById('endScore').textContent=G.bossHp<=0?'🧙‍♀️✨':'😢';
    detail=G.bossHp<=0?`Strega sconfitta con ${G.score} risposte giuste!`:`La strega ha vinto... riprova!`;
  }else{
    total=G.total;pct=G.score/total;
    document.getElementById('endScore').textContent=`${G.score}/${total}`;
    detail=`Miglior serie: ${G.bestStreak} di fila!`;
  }

  const stars=pct>=0.9?3:pct>=0.7?2:pct>=0.5?1:0;
  if(pct>=0.9){title='Sei un genio! 🧠✨'}
  else if(pct>=0.7){title='Bravissima! 💪'}
  else if(pct>=0.5){title='Buon lavoro! 👍'}
  else{title='Non mollare! 🌟'}

  document.getElementById('endTitle').textContent=title;
  document.getElementById('endStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('endDetail').textContent=detail;
  document.getElementById('endXp').textContent=`+${G.score*10} XP guadagnati!`;
  document.getElementById('endTrophy').textContent=G.mode==='boss'?(G.bossHp<=0?'🧚':'😢'):'🏆';

  if(pct>=0.7)confettiBurst(40);
  saveProgress();
}

// =============================================
// INIT — all event listeners, no inline onclick
// =============================================
try{loadProgress()}catch(e){}
try{updateTopbar()}catch(e){}

document.getElementById('modeClassica').addEventListener('click',function(e){e.preventDefault();startMode('classica')});
document.getElementById('modeBlitz').addEventListener('click',function(e){e.preventDefault();startMode('blitz')});
document.getElementById('modeVeroFalso').addEventListener('click',function(e){e.preventDefault();startMode('verofalso')});
document.getElementById('modeBoss').addEventListener('click',function(e){e.preventDefault();startMode('boss')});
document.getElementById('playAgainBtn').addEventListener('click',function(e){e.preventDefault();goToMenu()});
</script>
