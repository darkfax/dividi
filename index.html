<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dividi & Conquista! 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="app" id="app">
<div class="stars" id="stars"></div>

<!-- TOPBAR -->
<div class="topbar hidden" id="topbar">
  <div class="topbar-left">
    <div class="avatar-circle" id="avatar">🌷</div>
    <div class="player-info">
      <div class="player-name-display" id="playerNameDisp"></div>
      <div class="player-level" id="levelLabel">Lv.1</div>
      <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBar"></div></div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="stat-pill">⭐ <span id="totalScore">0</span></div>
    <div class="stat-pill">🔥 <span id="streakDisp">0</span></div>
    <button class="back-menu-btn" id="backMenuBtn">🏠</button>
  </div>
</div>

<!-- SCREEN: PROFILE SELECT -->
<div class="screen centered" id="profileScreen">
  <div class="hero-flower">🌸</div>
  <div class="profile-title">Dividi & Conquista!</div>
  <div class="profile-sub">Chi gioca?</div>
  <div class="profiles-list" id="profilesList"></div>
  <button class="new-profile-btn" id="newProfileBtn">+ Nuovo giocatore</button>
  <button class="small-link reset-all-btn" id="resetAllBtn">🗑️ Cancella tutti i dati</button>
</div>

<!-- SCREEN: CREATE PROFILE -->
<div class="screen centered hidden" id="createScreen">
  <div class="profile-title">Crea il tuo profilo!</div>
  <div class="profile-sub">Scegli il tuo avatar</div>
  <div class="avatar-picker" id="avatarPicker"></div>
  <div class="profile-sub profile-sub-spaced">Come ti chiami?</div>
  <input class="name-input" id="nameInput" type="text" placeholder="Il tuo nome..." maxlength="12" autocomplete="off">
  <button class="create-btn" id="createBtn" disabled>Iniziamo! 🚀</button>
  <button class="small-link" id="backToProfiles">← Torna indietro</button>
</div>

<!-- SCREEN: MODE SELECT -->
<div class="screen centered hidden" id="modeScreen">
  <div class="mode-title">Ciao <span id="welcomeName"></span>! 🌸</div>
  <div class="mode-subtitle">Scegli la tua avventura</div>
  <div class="modes-grid">
    <button class="mode-card" id="modeClassica"><div class="mode-emoji">📚</div><div class="mode-name">Classica</div><div class="mode-desc">15 domande con calma</div></button>
    <button class="mode-card" id="modeBlitz"><div class="mode-emoji">⚡</div><div class="mode-name">Blitz</div><div class="mode-desc">Quante in 60 secondi?</div></button>
    <button class="mode-card" id="modeVeroFalso"><div class="mode-emoji">🎯</div><div class="mode-name">Vero o Falso</div><div class="mode-desc">Risposte lampo!</div></button>
    <button class="mode-card" id="modeBoss"><div class="mode-emoji">🧚</div><div class="mode-name">Sfida Magica</div><div class="mode-desc">Sconfiggi la strega!</div></button>
  </div>
  <div class="bottom-links">
    <button class="small-link" id="showLeaderboard">🏆 Classifica</button>
    <button class="small-link" id="showTrophies">🎖️ Trofei</button>
    <button class="small-link" id="switchProfile">👤 Cambia giocatore</button>
  </div>
</div>

<!-- SCREEN: LEADERBOARD -->
<div class="screen centered hidden" id="lbScreen">
  <div class="lb-title">🏆 Classifica</div>
  <div class="lb-list" id="lbList"></div>
  <button class="small-link back-link-spaced" id="lbBack">← Torna al menù</button>
</div>

<!-- SCREEN: TROPHIES -->
<div class="screen centered hidden" id="trophyScreen">
  <div class="lb-title">🎖️ I miei trofei</div>
  <div class="trophies-grid" id="trophiesGrid"></div>
  <button class="small-link back-link-spaced" id="trophyBack">← Torna al menù</button>
</div>

<!-- SCREEN: GAME -->
<div class="game-area hidden" id="gameArea">
  <div class="game-header">
    <div class="game-mode-label" id="gameModeLabel">📚 Classica</div>
    <div class="game-timer hidden" id="gameTimer">60</div>
  </div>
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  <div class="boss-emoji hidden" id="bossEmoji">🧙‍♀️</div>
  <div class="boss-hp-bar hidden" id="bossHpBar"><div class="boss-hp-fill" id="bossHpFill"></div><div class="boss-hp-label" id="bossHpLabel">10/10</div></div>
  <div class="q-card" id="qCard">
    <div class="combo-display hidden" id="comboDisp">x2</div>
    <div class="q-badge badge-calc" id="qBadge">🔢 Calcolo</div>
    <div class="q-text" id="qText"></div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="fb-area hidden" id="fbArea"></div>
  </div>
</div>

<!-- SCREEN: END -->
<div class="end-screen hidden" id="endScreen">
  <div class="end-trophy" id="endTrophy">🏆</div>
  <div class="end-title" id="endTitle">Bravissima!</div>
  <div class="end-score" id="endScore">0</div>
  <div class="end-stars" id="endStars"></div>
  <div class="end-xp" id="endXp"></div>
  <div class="end-trophies" id="endNewTrophies"></div>
  <div class="end-detail" id="endDetail"></div>
  <button class="play-again-btn" id="playAgainBtn">Torna al menù 🏠</button>
</div>
</div>

<script src="./app.js"></script>
</body>
</html>
